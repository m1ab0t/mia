name: MIA Tests

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - '.github/workflows/cli-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - '.github/workflows/cli-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run MIA tests
        run: npm test
        env:
          CI: true
